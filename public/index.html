<script>
// ====== Constants ======
const CATEGORY_COLORS = {
  "上课/科研": "#BBDEFB",
  "实习/找工作": "#C8E6C9",
  "劳动": "#FFE0B2",
  "主线": "#E1BEE7",
  "其它非常不想做但是被迫做的事": "#FFCDD2",
  "不知道在干什么": "#EEEEEE",
};
const CATEGORIES = Object.keys(CATEGORY_COLORS);

// ====== State ======
let currentDate = getDateFromURL() || todayCN();
let isLoading = false;
let sessionMessages = [];  // 浏览器内存存储（当天消息）

// ====== Helpers ======
function todayCN() {
  const d = new Date(new Date().getTime() + 8 * 3600_000);
  return d.toISOString().slice(0, 10);
}

function getDateFromURL() {
  const p = new URLSearchParams(location.search);
  return p.get('date');
}

function escXml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('opacity-0', 'pointer-events-none');
  t.style.transform = 'translate(-50%, 0)';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => {
    t.classList.add('opacity-0', 'pointer-events-none');
    t.style.transform = 'translate(-50%, -20px)';
  }, 2000);
}

// ====== SVG Builder (mirrors lib/chart.ts buildSvg) ======
function buildChartSvg(date, grid) {
  const W = 860, P = 16, TITLE_H = 56, SUM_TITLE_H = 30, SUM_ITEM_H = 28;
  const colTime = 120, colAct = 360;
  const colLoc = W - P * 2 - colTime - colAct;
  const rowH = 25, headerH = 34;
  const tableBodyH = grid.slots.length * rowH;
  const summaryH = SUM_TITLE_H + CATEGORIES.length * SUM_ITEM_H + 20;
  const svgH = P + TITLE_H + 8 + headerH + tableBodyH + 20 + summaryH + P;

  let html = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${svgH}" viewBox="0 0 ${W} ${svgH}">
<rect width="100%" height="100%" fill="#ffffff"/>
<style>
  text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .ct { font-size: 20px; font-weight: 700; fill: #212121; }
  .th { font-size: 13px; font-weight: 700; fill: #ffffff; }
  .tx { font-size: 12px; fill: #333333; }
  .sl { font-size: 12px; font-weight: 600; fill: #333333; }
  .sv { font-size: 12px; font-weight: 700; fill: #555555; }
</style>
<rect x="${P}" y="${P}" width="${W-P*2}" height="${TITLE_H}" rx="6" fill="#f5f7fa"/>
<text x="${W/2}" y="${P+TITLE_H/2+7}" text-anchor="middle" class="ct">${date} 日程复盘</text>
<rect x="${P}" y="${P+TITLE_H+8}" width="${W-P*2}" height="${headerH}" rx="4" fill="#616161"/>
<text x="${P+colTime/2}" y="${P+TITLE_H+8+headerH/2+5}" text-anchor="middle" class="th">时间段</text>
<text x="${P+colTime+colAct/2}" y="${P+TITLE_H+8+headerH/2+5}" text-anchor="middle" class="th">活动</text>
<text x="${P+colTime+colAct+colLoc/2}" y="${P+TITLE_H+8+headerH/2+5}" text-anchor="middle" class="th">地点</text>`;

  const tableTop = P + TITLE_H + 8 + headerH;
  for (let i = 0; i < grid.slots.length; i++) {
    const s = grid.slots[i];
    const y = tableTop + i * rowH;
    const bg = CATEGORY_COLORS[s.category] || '#f5f5f5';
    const op = i % 2 === 1 ? '0.7' : '0.5';
    html += `
<rect x="${P}" y="${y}" width="${W-P*2}" height="${rowH}" fill="${bg}" fill-opacity="${op}"/>
<line x1="${P+colTime}" y1="${y}" x2="${P+colTime}" y2="${y+rowH}" stroke="#e0e0e0" stroke-width="0.5"/>
<line x1="${P+colTime+colAct}" y1="${y}" x2="${P+colTime+colAct}" y2="${y+rowH}" stroke="#e0e0e0" stroke-width="0.5"/>
<line x1="${P}" y1="${y+rowH}" x2="${W-P}" y2="${y+rowH}" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="${P+colTime/2}" y="${y+rowH/2+4}" text-anchor="middle" class="tx">${escXml(s.time)}</text>
<text x="${P+colTime+8}" y="${y+rowH/2+4}" text-anchor="start" class="tx">${escXml(s.activity)}</text>
<text x="${P+colTime+colAct+8}" y="${y+rowH/2+4}" text-anchor="start" class="tx">${escXml(s.location)}</text>`;
  }

  const tableEnd = tableTop + tableBodyH;
  html += `
<rect x="${P}" y="${tableTop}" width="${W-P*2}" height="${tableBodyH}" fill="none" stroke="#bdbdbd" stroke-width="1"/>`;

  const sumTop = tableEnd + 20;
  html += `
<rect x="${P}" y="${sumTop}" width="${W-P*2}" height="${summaryH}" rx="6" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<text x="${P+16}" y="${sumTop+SUM_TITLE_H/2+5}" class="sl" style="font-size:14px;">分类汇总</text>`;

  for (let j = 0; j < CATEGORIES.length; j++) {
    const cat = CATEGORIES[j];
    const hours = grid.summary[cat] || 0;
    const pct = Math.min(100, Math.round((hours / 24) * 100));
    const bg = CATEGORY_COLORS[cat];
    const itemY = sumTop + SUM_TITLE_H + 4 + j * SUM_ITEM_H;
    const barW = Math.max(2, Math.round((W - P * 2 - 280) * (pct / 100)));
    html += `
<rect x="${P+16}" y="${itemY}" width="230" height="20" rx="4" fill="${bg}"/>
<text x="${P+16+115}" y="${itemY+14}" text-anchor="middle" class="sl">${cat}</text>
<rect x="${P+16+238}" y="${itemY+2}" width="${W-P*2-310}" height="16" rx="8" fill="#eeeeee"/>
<rect x="${P+16+238}" y="${itemY+2}" width="${barW}" height="16" rx="8" fill="${bg}"/>
<text x="${W-P-12}" y="${itemY+14}" text-anchor="end" class="sv">${hours.toFixed(1)}h</text>`;
  }
  html += '</svg>';
  return html;
}

// ====== DOM ======
const chatArea = document.getElementById('chat-area');
const msgInput = document.getElementById('msg-input');
const btnSend = document.getElementById('btn-send');
const dateBadge = document.getElementById('date-badge');
const dateDivider = document.getElementById('date-divider');
const chartContent = document.getElementById('chart-content');
const chartModal = document.getElementById('chart-modal');

// Init date badge
dateBadge.textContent = currentDate;

// ====== Chat Rendering ======
function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'flex flex-row-reverse items-start gap-3 max-w-[85%] ml-auto';
  div.innerHTML = `<div class="bg-primary p-md rounded-xl rounded-tr-none message-shadow"><p class="font-body-md text-body-md text-on-primary"></p></div>`;
  div.querySelector('p').textContent = text;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addAIBubble(html) {
  const div = document.createElement('div');
  div.className = 'flex items-start gap-3 max-w-[85%]';
  div.innerHTML = `<div class="w-8 h-8 rounded-full flex-shrink-0 bg-primary-fixed flex items-center justify-center"><span class="material-symbols-outlined text-on-primary-fixed text-[18px]">auto_awesome</span></div><div class="bg-white p-md rounded-xl rounded-tl-none message-shadow ai-content"></div>`;
  div.querySelector('.ai-content').innerHTML = html;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addChartCard(svgStr) {
  const div = document.createElement('div');
  div.className = 'flex items-start gap-3 max-w-[95%]';
  div.innerHTML = `<div class="w-8 h-8 rounded-full flex-shrink-0 bg-primary-fixed flex items-center justify-center"><span class="material-symbols-outlined text-on-primary-fixed text-[18px]">auto_awesome</span></div><div class="bg-white p-3 rounded-xl rounded-tl-none message-shadow chart-card w-full"><div class="svg-wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch;"></div></div>`;
  div.querySelector('.svg-wrap').innerHTML = svgStr;
  chatArea.appendChild(div);
  scrollToBottom();
}

function showLoading() {
  const div = document.createElement('div');
  div.id = 'loading-msg';
  div.className = 'flex items-start gap-3 max-w-[85%]';
  div.innerHTML = `<div class="w-8 h-8 rounded-full flex-shrink-0 bg-primary-fixed flex items-center justify-center"><span class="material-symbols-outlined text-on-primary-fixed text-[18px]">auto_awesome</span></div><div class="bg-white p-md rounded-xl rounded-tl-none message-shadow flex gap-1.5 items-center"><span class="loading-dot w-2 h-2 bg-primary rounded-full inline-block"></span><span class="loading-dot w-2 h-2 bg-primary rounded-full inline-block"></span><span class="loading-dot w-2 h-2 bg-primary rounded-full inline-block"></span></div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function hideLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

// ====== API Calls ======
async function apiCall(url, body) {
  const opts = {
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) {
    opts.method = 'POST';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(url, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: resp.statusText }));
    throw new Error(err.error || `HTTP ${resp.status}`);
  }
  return resp.json();
}

async function handleUserMessage(text) {
  if (isLoading) return;
  isLoading = true;
  addUserBubble(text);
  msgInput.value = '';
  showLoading();

  try {
    // 1. Extract info via proxy（附带用户自定义分类标准）
    const extractResult = await apiCall('/api/proxy', {
      action: 'extract',
      text,
      customRule: localStorage.getItem('customRule') || '',
    });

    // 2. Build message
    const msg = {
      timestamp: new Date(new Date().getTime() + 8 * 3600_000).toISOString(),
      text: text,
      location: extractResult.location || '',
      event: extractResult.event || text,
      category: extractResult.category || '不知道在干什么',
    };

    // 3. 暂存浏览器内存（无需数据库）
    sessionMessages.push(msg);

    hideLoading();
    addAIBubble(`<p class="font-body-md text-body-md text-on-surface">收到！已记录日程。<br><span class="text-sm text-outline">📍 ${msg.location || '未指定'} | 🏷 ${msg.category}</span></p>`);
  } catch (e) {
    hideLoading();
    addAIBubble(`<p class="font-body-md text-body-md text-error">记录失败: ${e.message}</p>`);
  }
  isLoading = false;
}

async function handlePreview() {
  if (isLoading) return;
  isLoading = true;
  addAIBubble('<p class="font-body-md text-body-md text-on-surface">正在生成今日复盘图表...</p>');
  showLoading();

  try {
    if (sessionMessages.length === 0) {
      hideLoading();
      addAIBubble('<p class="font-body-md text-body-md text-on-surface">今天还没有记录任何日程，先发几条消息吧！</p>');
      isLoading = false;
      return;
    }

    // Generate grid via proxy（用内存中暂存的消息）
    const gridResp = await apiCall('/api/proxy', {
      action: 'grid',
      date: currentDate,
      messages: sessionMessages,
    });

    if (!gridResp.grid) {
      throw new Error('AI 未能生成网格数据');
    }

    // 3. Build SVG
    const svg = buildChartSvg(currentDate, gridResp.grid);

    hideLoading();
    addChartCard(svg);
  } catch (e) {
    hideLoading();
    addAIBubble(`<p class="font-body-md text-body-md text-error">生成复盘失败: ${e.message}</p>`);
  }
  isLoading = false;
}

async function handleShowData() {
  if (isLoading) return;
  isLoading = true;
  addAIBubble('<p class="font-body-md text-body-md text-on-surface">正在查询今天的记录...</p>');

  try {
    if (sessionMessages.length === 0) {
      addAIBubble('<p class="font-body-md text-body-md text-on-surface">今天还没有记录任何日程。</p>');
    } else {
      let html = '<p class="font-body-md text-body-md text-on-surface mb-2">今日已记录 <span class="font-bold">' + sessionMessages.length + '</span> 条日程：</p>';
      html += '<div class="space-y-1 mt-2">';
      for (const m of sessionMessages) {
        html += `<div class="text-sm text-on-surface-variant py-1 border-b border-outline-variant/20"><span class="text-outline">${m.timestamp.slice(11,16)}</span> ${m.event || m.text} @${m.location || '未知'} <span class="text-xs bg-surface-container-low px-1.5 py-0.5 rounded">${m.category || '未分类'}</span></div>`;
      }
      html += '</div>';
      addAIBubble(html);
    }
  } catch (e) {
    addAIBubble(`<p class="font-body-md text-body-md text-error">查询失败: ${e.message}</p>`);
  }
  isLoading = false;
}

function closeChart() {
  chartModal.classList.add('hidden');
  chartContent.innerHTML = '';
}


// ====== Event Handlers ======
btnSend.addEventListener('click', async () => {
  const text = msgInput.value.trim();
  if (!text) return;
  await handleUserMessage(text);
});

msgInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text) return;
    await handleUserMessage(text);
  }
});

msgInput.addEventListener('focus', () => {
  document.getElementById('input-wrapper').classList.add('ring-2', 'ring-primary/20');
});
msgInput.addEventListener('blur', () => {
  document.getElementById('input-wrapper').classList.remove('ring-2', 'ring-primary/20');
});

// Quick action buttons
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cmd = btn.dataset.cmd;
    if (cmd === '/预览') handlePreview();
    else if (cmd === '/数据') handleShowData();
  });
});

// Also handle text commands
const origHandleMessage = handleUserMessage;
handleUserMessage = async function(text) {
  if (text === '/预览') {
    await handlePreview();
    return;
  }
  if (text === '/数据') {
    await handleShowData();
    return;
  }
  return origHandleMessage(text);
};

// Settings modal
const settingsModal = document.getElementById('settings-modal');
const customRuleInput = document.getElementById('custom-rule-input');
const btnSaveRule = document.getElementById('btn-save-rule');

// 加载已保存的分类标准
customRuleInput.value = localStorage.getItem('customRule') || '';

document.getElementById('btn-settings').addEventListener('click', () => {
  settingsModal.classList.remove('hidden');
});

function closeSettings() {
  settingsModal.classList.add('hidden');
}

btnSaveRule.addEventListener('click', () => {
  const rule = customRuleInput.value.trim();
  localStorage.setItem('customRule', rule);
  closeSettings();
  showToast('分类标准已保存');
});

// History button: prompt for date
document.getElementById('btn-history').addEventListener('click', () => {
  const d = prompt('输入日期查看历史复盘 (YYYY-MM-DD)：', currentDate);
  if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    currentDate = d;
    dateBadge.textContent = d;
    dateDivider.textContent = d;
    addAIBubble(`<p class="font-body-md text-body-md text-on-surface">已切换到 ${d}。点击"预览"查看该日期的复盘图表。</p>`);
  }
});


// ====== Init ======
async function init() {
  // Register Service Worker (for offline caching)
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      console.log('SW registered:', reg.scope);
    } catch (e) {
      console.warn('SW registration failed:', e.message);
    }
  }

  if (currentDate !== todayCN()) {
    dateBadge.textContent = currentDate;
    dateDivider.textContent = currentDate;
    // 历史日期的数据需等后续接入数据库后才能查看
  }
}

init();
</script>
